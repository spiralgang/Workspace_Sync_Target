name: Extract ZIP and Create PR

on:
  workflow_dispatch:

jobs:
  extract-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch main
        run: |
          git fetch origin main

      - name: Find .zip files in main
        id: find_zips
        run: |
          # List all files in origin/main and filter for .zip (case-insensitive)
          mapfile -t zips < <(git ls-tree -r --name-only origin/main | grep -i '\.zip$' || true)
          printf '%s\n' "${zips[@]}" > zips.txt
          echo "found=${#zips[@]}" >> $GITHUB_OUTPUT

      - name: Extract zips into per-zip directories
        if: steps.find_zips.outputs.found != '0'
        run: |
          mkdir -p extracted
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            filename=$(basename "$path")
            name="${filename%.*}"
            outdir="extracted/$name"
            mkdir -p "$outdir"
            git show "origin/main:$path" > "/tmp/$filename"
            # unzip non-interactive, overwrite files inside the per-zip output dir
            unzip -o -q "/tmp/$filename" -d "$outdir"
            echo "Extracted $path -> $outdir"
          done < zips.txt
          ls -la extracted

      - name: Prepare branch and commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Create or reset local branch for extraction output
          git checkout -B extract-zips
          git add extracted || true
          # Commit only if there are staged changes
          if ! git diff --staged --quiet; then
            git commit -m "Extract .zip files from origin/main"
            git push --set-upstream origin extract-zips
          else
            echo "No changes to commit"
          fi

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: extract-zips
          title: "Extract .zip files from main"
          body: "Automated extraction of .zip files from origin/main"
          commit-message: "Extract .zip files from main"
